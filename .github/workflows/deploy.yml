name: Deploy VMQ App to ARM64 Server

on:
  push:
    branches:
      - main # 当推送到 main 分支时触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 通过 SCP 传输代码到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          # 关键修改：增加 !./config.yaml 和 !./.env 防止本地配置污染服务器
          source: ".,!./.git,!./postgres_data,!./valkey_data,!./logs,!./config.yaml,!./.env" 
          target: "/opt/vmq-app"

      - name: 在服务器上生成生产配置并部署
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          # 注意：需要把机密变量通过 env 传递给 ssh-action
          envs: PROD_CONFIG_YAML 
          script: |
            cd /home/cj/web_services/vmq-api-go
            
            # 停止并移除旧的 Go 容器（数据库和缓存不受影响，除非它们也更新了）
            docker compose stop app
            docker compose rm -f app
            
            # 在服务器上基于最新的代码构建 ARM64 镜像
            docker compose build app
            
            # 启动所有服务
            docker compose up -d
            
            # 清理无用的虚悬镜像，防止服务器磁盘爆满
            docker image prune -f