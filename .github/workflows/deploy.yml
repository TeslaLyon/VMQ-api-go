name: Deploy VMQ App to ARM64 Server

on:
  push:
    branches:
      - main # 当推送到 main 分支时触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 1. 使用 EOF 语法安全写入，防止密码中的 $ 和 " 破坏脚本
      - name: 生成生产环境 config.yaml
        run: |
          cat << 'EOF' > config.yaml
          ${{ secrets.PROD_CONFIG_YAML }}
          EOF

      # 2. 排错探针：打印生成的文件大小和行数（绝不会在日志中泄露密码内容）
      - name: 检查生成状态
        run: |
          echo "文件大小："
          ls -lh config.yaml
          echo "文件行数："
          wc -l config.yaml

      # 3. 传输代码
      - name: 通过 SCP 传输代码到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          # 🚨 再次确认：这里绝对不能有 !./config.yaml
          # 我为了保险，把 config.yaml 明确写在了最前面强制包含
          source: "config.yaml,.,!./.git,!./postgres_data,!./valkey_data,!./logs,!./.env" 
          target: "/home/cj/web_services/vmq-api-go"

      # 4. 执行重启
      - name: 在服务器上执行部署
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /home/cj/web_services/vmq-api-go

            # 【优化1】先拉取最新代码状态，不要无脑 down，减少服务真空期
            # 直接强制无缓存构建最新的镜像！这是解决代码不更新的核心！
            docker compose build --no-cache app
            
            # 【优化2】使用 up -d 会自动重建发生改变的容器，不需要先执行 down
            # --force-recreate 确保即使配置看起来没变，也会销毁旧容器启用新镜像
            docker compose up -d --force-recreate app
            
            # 清理无用的虚悬镜像和停止的容器，释放磁盘空间
            docker image prune -f