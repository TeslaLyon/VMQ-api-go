name: Deploy VMQ App to ARM64 Server

on:
  push:
    branches:
      - main # 当推送到 main 分支时触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 1. 使用 EOF 语法安全写入，防止密码中的 $ 和 " 破坏脚本
      - name: 生成生产环境 config.yaml
        run: |
          cat << 'EOF' > config.yaml
          ${{ secrets.PROD_CONFIG_YAML }}
          EOF

      # 2. 排错探针：打印生成的文件大小和行数（绝不会在日志中泄露密码内容）
      - name: 检查生成状态
        run: |
          echo "文件大小："
          ls -lh config.yaml
          echo "文件行数："
          wc -l config.yaml

      # 3. 传输代码
      - name: 通过 SCP 传输代码到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          # 🚨 再次确认：这里绝对不能有 !./config.yaml
          # 我为了保险，把 config.yaml 明确写在了最前面强制包含
          source: "config.yaml,.,!./.git,!./postgres_data,!./valkey_data,!./logs,!./.env" 
          target: "/home/cj/web_services/vmq-api-go"

      # 4. 执行重启
      - name: 在服务器上执行部署
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /home/cj/web_services/vmq-api-go

            docker compose down
            
            # 在服务器上基于最新的代码构建 ARM64 镜像
            docker compose build app
            
            # 启动所有服务
            docker compose up -d
            
            # 清理无用的虚悬镜像，防止服务器磁盘爆满
            docker image prune -f