services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: vmq-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: vmq-postgres
    restart: unless-stopped
    environment:
      # 引用 .env 中的变量
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"] # 这里也可以使用变量
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:9-alpine
    container_name: vmq-valkey
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./valkey_data:/data
    # 在 command 中直接使用 ${VALKEY_PASSWORD} 传入密码
    command: valkey-server --requirepass ${VALKEY_PASSWORD} --appendonly yes
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"] # 注意：加了密码后，健康检查也需要通过 -a 携带密码
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  gateway_net:
    external: true